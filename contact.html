<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jayanth S</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header, footer {
            background-color: #0077cc;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            text-align: center;
        }

        .icons {
            margin: 20px 0;
        }

        .icons a {
            display: inline-block;
            margin: 0 15px;
            transition: transform 0.3s ease;
        }

        .icons a img {
            width: 50px;
            height: 50px;
        }

        .icons a:hover {
            transform: scale(1.1);
        }

        a {
            color: #ffdd00;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .contact-item {
            margin: 15px 0;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact</h1>
        <a href="index.html">Back to Home</a>
    </header>
    <div class="container">
        <div class="contact-item">
            <p>Phone: <a href="tel:+917259902175">7259902175</a></p>
        </div>
        <div class="contact-item">
            <p>Email: <a href="mailto:jayanthgowda170@gmail.com">jayanthgowda170@gmail.com</a></p>
        </div>
        <div class="icons">
            <a href="https://www.linkedin.com/in/jayanth-s/" target="_blank" title="LinkedIn Profile">
                <img src="linkedIn.png" alt="LinkedIn Icon">
            </a>
            <a href="https://github.com/Jayanth175" target="_blank" title="GitHub Profile">
                <img src="github.png" alt="GitHub Icon">
            </a>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Jayanth S. All rights reserved.</p>
    </footer>
</body>
</html>
