<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education - Jayanth S</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #0077cc;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .education-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 8px;
        }
        .education-item img {
            width: 60px;
            height: 60px;
            margin-right: 20px;
            border-radius: 50%;
            border: 2px solid #0077cc;
        }
        .education-details {
            text-align: left;
        }
        .education-details strong {
            font-size: 1.2em;
            color: #0077cc;
        }
        a {
            color: #ffdd00;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Education</h1>
        <a href="index.html">Back to Home</a>
    </header>
    <div class="container">
        <div class="education-item">
            <img src="jss.jpeg" alt="JSS College Icon">
            <div class="education-details">
                <strong>MCA (Master of Computer Applications)</strong>
                <p>JSS College of Arts, Commerce, and Science, Mysuru</p>
                <p>CGPA: 8.47</p>
                <p>Passout: 2024</p>
            </div>
        </div>
        <div class="education-item">
            <img src="yuavaraja's.jpg" alt="Yuvaraja's College Icon">
            <div class="education-details">
                <strong>BCA (Bachelor of Computer Applications)</strong>
                <p>Yuvaraja's College, Mysuru</p>
                <p>CGPA: 7.44</p>
                <p>Passout: 2022</p>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Jayanth S. All rights reserved.</p>
    </footer>
</body>
</html>
