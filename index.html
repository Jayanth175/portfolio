    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #0077cc;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 15px;
            text-align: center;
        }

        .container a {
            display: inline-block;
            position: relative;
            margin: 20px 10px;
            text-decoration: none;
            font-size: 1.2em;
            color: #fff;
            background: linear-gradient(45deg, #0077cc, #005fa3);
            border-radius: 25px;
            padding: 15px 25px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container a:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .container a i {
            margin-right: 8px;
            font-size: 1.5em;
        }

        footer {
            text-align: center;
            padding: 20px 0;
            background-color: #005fa3;
            color: #fff;
        }

        footer a {
            color: #ffdd00;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
